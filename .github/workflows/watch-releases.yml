name: Watch upstream releases

# Polls oblien/openship's public releases API on a schedule and posts a
# Discord announcement when a new release appears. Lives in its own
# standalone repo since we don't have admin access on the upstream repo
# (can't register a webhook there) — reading a public repo's release API
# needs no special permission, just somewhere of our own to run from.

on:
  schedule:
    - cron: "7,27,47 * * * *" # every 20 minutes, off the top of the hour
  workflow_dispatch: {} # manual "Run workflow" button, for testing

permissions:
  contents: write # to commit the last-seen-release marker back

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check latest upstream release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest=$(gh api repos/oblien/openship/releases/latest)
          tag=$(echo "$latest" | jq -r '.tag_name')
          name=$(echo "$latest" | jq -r '.name // .tag_name')
          url=$(echo "$latest" | jq -r '.html_url')
          body=$(echo "$latest" | jq -r '.body // ""')

          state_file="state/last-upstream-release.txt"
          mkdir -p "$(dirname "$state_file")"
          last_seen=""
          if [ -f "$state_file" ]; then
            last_seen=$(cat "$state_file")
          fi

          if [ "$tag" = "$last_seen" ]; then
            echo "No new release ($tag already announced)."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New release found: $tag (was: ${last_seen:-none})"
          echo "$tag" > "$state_file"

          echo "new_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

          # Discord embed description caps out well under 4096 chars in
          # practice — trim long release bodies so we never hit the limit.
          {
            echo "body<<EOF"
            echo "$body" | cut -c1-1500
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        if: steps.release.outputs.new_release == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          jq -n \
            --arg title "🚀 New Openship Release: ${{ steps.release.outputs.name }}" \
            --arg url "${{ steps.release.outputs.url }}" \
            --arg description "${{ steps.release.outputs.body }}" \
            '{
              username: "Openship",
              embeds: [{
                title: $title,
                url: $url,
                description: $description,
                color: 3447003
              }]
            }' | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"

      - name: Commit updated marker
        if: steps.release.outputs.new_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/last-upstream-release.txt
          git commit -m "chore: mark upstream release ${{ steps.release.outputs.tag }} as announced"
          git push
