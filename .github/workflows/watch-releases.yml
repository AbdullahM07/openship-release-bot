name: Watch upstream releases

# Polls oblien/openship's public releases API on a schedule. On a new
# release, pulls every commit merged since the PREVIOUS release and
# posts them as a flat, emoji-prefixed changelog to Discord — same
# template shape as our manual announcements, generated automatically
# instead of hand-written. Wording stays as the raw commit message
# (no AI rewriting); only the emoji per line is guessed from keywords.
#
# Lives in its own standalone repo since we don't have admin access on
# the upstream repo (can't register a webhook there) — reading a public
# repo's release/commit API needs no special permission, just somewhere
# of our own to run from.

on:
  schedule:
    - cron: "7,27,47 * * * *" # every 20 minutes, off the top of the hour
  workflow_dispatch: {} # manual "Run workflow" button, for testing

permissions:
  contents: write # to commit the last-seen-release marker back

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build changelog for new release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          releases=$(gh api "repos/oblien/openship/releases?per_page=2")
          tag=$(echo "$releases" | jq -r '.[0].tag_name')
          name=$(echo "$releases" | jq -r '.[0].name // .[0].tag_name')
          url=$(echo "$releases" | jq -r '.[0].html_url')
          prev_tag=$(echo "$releases" | jq -r '.[1].tag_name // ""')

          state_file="state/last-upstream-release.txt"
          mkdir -p "$(dirname "$state_file")"
          last_seen=""
          if [ -f "$state_file" ]; then
            last_seen=$(cat "$state_file")
          fi

          if [ "$tag" = "$last_seen" ]; then
            echo "No new release ($tag already announced)."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New release found: $tag (was: ${last_seen:-none})"
          echo "$tag" > "$state_file"

          # Every commit merged since the previous release, in original
          # order, each prefixed with an emoji guessed from a keyword in
          # its message. Merge-commit wrappers ("Merge pull request
          # #N...") are dropped — the real fix/feat commit they wrap is
          # what actually describes the change.
          if [ -n "$prev_tag" ]; then
            commits_json=$(gh api "repos/oblien/openship/compare/${prev_tag}...${tag}" \
              --jq '[.commits[].commit.message | split("\n")[0] | select(startswith("Merge pull request") | not)]')
          else
            commits_json='[]'
          fi

          items=$(echo "$commits_json" | jq -r '
            def emoji(msg):
              (msg | ascii_downcase) as $m
              | if ($m | test("security|vuln|cve")) then "🔒"
                elif ($m | test("(^|[^a-z])(fix|bug)([^a-z]|$)")) then "🐛"
                elif ($m | test("(^|[^a-z])(doc|docs|readme)([^a-z]|$)")) then "📄"
                elif ($m | test("(^|[^a-z])(add|support|feat|enhance|introduce)([^a-z]|$)")) then "✨"
                else "🔧" end;
            .[] | "- " + emoji(.) + " " + .
          ')

          {
            echo "Latest release: **${tag}** ([full changelog](${url}))"
            echo
            echo "**What's new recently:**"
            if [ -n "$items" ]; then
              echo "$items"
            fi
            echo
            echo "Grab the latest build or update via:"
            echo '```'
            echo "npm i -g openship"
            echo '```'
            echo
            echo "Full release notes: ${url}"
          } > /tmp/description.md

          echo "new_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

          {
            echo "description<<EOF"
            cat /tmp/description.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        if: steps.release.outputs.new_release == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          # Passed via env, NOT interpolated into the script body — the
          # changelog contains a ```code block``` (backticks) and commit
          # messages we don't control. Splicing either straight into a
          # double-quoted run: string lets bash re-parse those characters
          # as command substitution instead of treating them as data
          # (this is exactly what silently ate the npm code block before).
          # An env var's value is never re-parsed by the shell this way.
          DESCRIPTION: ${{ steps.release.outputs.description }}
        run: |
          set -euo pipefail
          jq -n \
            --arg title "📢 Openship Update — ${RELEASE_TAG}" \
            --arg description "$DESCRIPTION" \
            '{
              username: "Openship",
              embeds: [{
                title: $title,
                description: $description,
                color: 3447003
              }]
            }' | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"

      - name: Commit updated marker
        if: steps.release.outputs.new_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/last-upstream-release.txt
          git commit -m "chore: mark upstream release ${{ steps.release.outputs.tag }} as announced"
          git push
